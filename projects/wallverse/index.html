<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WallVerse — Discover stunning wallpapers from Unsplash, Pexels, Pixabay and more.">
  <title>WallVerse — Discover Beautiful Wallpapers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="wallverse.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

<!-- NAVBAR -->
<nav class="wv-nav">
  <a href="../../index.html" class="wv-logo">Wall<span>Verse</span></a>
  <div class="wv-res-wrap">
    <select class="wv-res-select" id="resFilter" onchange="applyResolution()">
      <option value="">Any Resolution</option>
      <option value="1920x1080">1080p (1920×1080)</option>
      <option value="2560x1440">2K (2560×1440)</option>
      <option value="3840x2160">4K (3840×2160)</option>
      <option value="1280x720">720p (1280×720)</option>
    </select>
  </div>
  <div class="wv-nav-right">
    <button class="wv-fav-btn" id="favToggle" onclick="toggleFavView()">♡ Favourites</button>
    <button class="wv-fav-btn" id="randomBtn" onclick="showRandom()">⚡ Random</button>
  </div>
</nav>

<!-- HERO -->
<section class="wv-hero">
  <h1>Discover <em>stunning</em><br>wallpapers</h1>
  <p class="wv-hero-sub">Millions of wallpapers from Unsplash, Pexels, Pixabay & Wallhaven</p>
  <div class="wv-search-wrap">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="Search mountains, cities, anime, space...">
  </div>
  <div class="wv-color-row">
    <span class="wv-color-label">Or search by colour</span>
    <div class="wv-color-swatches">
      <button class="wv-swatch" data-color="black"   style="background:#111111" title="Black"></button>
      <button class="wv-swatch" data-color="white"   style="background:#f5f5f5" title="White"></button>
      <button class="wv-swatch" data-color="yellow"  style="background:#f59e0b" title="Amber"></button>
      <button class="wv-swatch" data-color="orange"  style="background:#f97316" title="Orange"></button>
      <button class="wv-swatch" data-color="red"     style="background:#ef4444" title="Red"></button>
      <button class="wv-swatch" data-color="purple"  style="background:#8b5cf6" title="Purple"></button>
      <button class="wv-swatch" data-color="blue"    style="background:#3b82f6" title="Blue"></button>
      <button class="wv-swatch" data-color="teal"    style="background:#14b8a6" title="Teal"></button>
      <button class="wv-swatch" data-color="green"   style="background:#22c55e" title="Green"></button>
      <button class="wv-swatch" data-color="magenta" style="background:#d946ef" title="Pink"></button>
    </div>
  </div>
</section>

<!-- WALLPAPER OF THE DAY -->
<div class="wv-wotd" id="wotd"></div>

<!-- CATEGORY BAR -->
<div class="wv-catbar-wrap">
  <div class="wv-catbar">
    <button class="wv-cat-btn active" data-cat="nature">Nature</button>
    <button class="wv-cat-btn" data-cat="city">City</button>
    <button class="wv-cat-btn" data-cat="space">Space</button>
    <button class="wv-cat-btn" data-cat="anime">Anime</button>
    <button class="wv-cat-btn" data-cat="abstract">Abstract</button>
    <button class="wv-cat-btn" data-cat="mountains">Mountains</button>
    <button class="wv-cat-btn" data-cat="ocean">Ocean</button>
    <button class="wv-cat-btn" data-cat="forest">Forest</button>
    <button class="wv-cat-btn" data-cat="minimal">Minimal</button>
    <button class="wv-cat-btn" data-cat="dark">Dark</button>
  </div>
</div>

<!-- MAIN -->
<main class="wv-main">
  <div class="wv-grid-header">
    <span class="wv-grid-title" id="gridTitle">Nature</span>
    <span class="wv-count" id="wallCount"></span>
  </div>
  <div class="wv-masonry" id="gallery"></div>
  <div class="wv-loader" id="loader">
    <div class="wv-loader-dots">
      <div class="wv-loader-dot"></div>
      <div class="wv-loader-dot"></div>
      <div class="wv-loader-dot"></div>
    </div>
  </div>
  <div class="wv-empty" id="emptyState" style="display:none">
    <i class="fas fa-image"></i>
    No wallpapers found. Try a different search.
  </div>
</main>

<!-- MODAL -->
<div class="wv-modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <button class="wv-modal-close" onclick="closeModal()">
    <i class="fas fa-xmark"></i>
  </button>
  <img class="wv-modal-img" id="modalImg" src="" alt="">
  <div class="wv-modal-actions">
    <span class="wv-modal-source" id="modalSource"></span>
    <button class="wv-modal-fav" id="modalFavBtn" onclick="toggleModalFav()">♡ Save</button>
    <button class="wv-download-btn" id="downloadBtn" onclick="downloadWall()">↓ Download</button>
  </div>
</div>

<footer class="wv-footer">© 2026 WallVerse · Built by Prince</footer>

<script src="data.js"></script>
<script>
  // ── State ─────────────────────────────────
  let currentPage  = 1;
  let currentQuery = "nature";
  let isLoading    = false;
  let totalLoaded  = 0;
  let showingFavs  = false;
  let currentItem  = null;
  let activeColor  = null;
  let activeWidth  = null;
  let activeHeight = null;

  const gallery     = document.getElementById("gallery");
  const loader      = document.getElementById("loader");
  const emptyState  = document.getElementById("emptyState");
  const wallCount   = document.getElementById("wallCount");
  const gridTitle   = document.getElementById("gridTitle");
  const searchInput = document.getElementById("searchInput");

  // ── LocalStorage helpers ──────────────────
  function getFavs()          { return JSON.parse(localStorage.getItem("wv_favs")    || "[]"); }
  function saveFavs(f)        { localStorage.setItem("wv_favs", JSON.stringify(f)); }
  function getHistory()       { return JSON.parse(localStorage.getItem("wv_history") || "[]"); }
  function saveHistory(h)     { localStorage.setItem("wv_history", JSON.stringify(h)); }

  function isFaved(id)        { return getFavs().some(f => f.id === id); }

  function toggleFav(item) {
    let favs = getFavs();
    if (isFaved(item.id)) favs = favs.filter(f => f.id !== item.id);
    else favs.push(item);
    saveFavs(favs);
    return isFaved(item.id);
  }

  function saveToHistory(item) {
    let h = getHistory().filter(x => x.id !== item.id);
    h.unshift(item);
    if (h.length > 10) h = h.slice(0, 10);
    saveHistory(h);
  }

  // ── Make card ─────────────────────────────
  function makeCard(item) {
    const card = document.createElement("div");
    card.className = "wv-card";
    card.onclick = () => openModal(item);

    const img = document.createElement("img");
    img.src = item.thumb;
    img.loading = "lazy";
    img.alt = item.tags?.[0] || "wallpaper";

    const overlay = document.createElement("div");
    overlay.className = "wv-card-overlay";
    overlay.innerHTML = `<span class="wv-card-source">${item.source || ""}</span>`;

    const favIcon = document.createElement("button");
    favIcon.className = "wv-fav-icon" + (isFaved(item.id) ? " saved" : "");
    favIcon.textContent = isFaved(item.id) ? "♥" : "♡";
    favIcon.title = "Save to favourites";
    favIcon.onclick = (e) => {
      e.stopPropagation();
      const faved = toggleFav(item);
      favIcon.textContent = faved ? "♥" : "♡";
      favIcon.classList.toggle("saved", faved);
    };

    card.appendChild(img);
    card.appendChild(overlay);
    card.appendChild(favIcon);
    return card;
  }

  // ── Load wallpapers ───────────────────────
  async function loadMore() {
    if (isLoading) return;
    isLoading = true;
    loader.style.display = "block";
    emptyState.style.display = "none";

    const results = await searchWallpapers(currentQuery, currentPage, false, null, activeWidth, activeHeight);

    if (results.length === 0 && totalLoaded === 0) {
      emptyState.style.display = "block";
    }

    results.forEach(item => gallery.appendChild(makeCard(item)));
    totalLoaded += results.length;
    wallCount.textContent = `${totalLoaded}+ wallpapers`;
    currentPage++;
    isLoading = false;
    loader.style.display = "none";
  }

  // ── Reset gallery ─────────────────────────
  function resetGallery(query, title) {
    gallery.innerHTML = "";
    gallery.classList.add("wv-masonry");
    gallery.style.cssText = "";
    currentPage  = 1;
    currentQuery = query;
    totalLoaded  = 0;
    showingFavs  = false;
    activeColor  = null;
    activeWidth  = null;
    activeHeight = null;
    gridTitle.textContent = title || query;
    document.getElementById("favToggle").classList.remove("active");
    document.getElementById("resFilter").value = "";
    document.querySelectorAll(".wv-swatch").forEach(b => b.classList.remove("active"));
    loadMore();
  }

  // ── Search ────────────────────────────────
  let debounceTimer;
  searchInput.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      const q = searchInput.value.trim() || "nature";
      document.querySelectorAll(".wv-cat-btn").forEach(b => b.classList.remove("active"));
      resetGallery(q, q);
    }, 500);
  });

  // ── Category buttons ──────────────────────
  document.querySelectorAll(".wv-cat-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".wv-cat-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      searchInput.value = "";
      resetGallery(btn.dataset.cat, btn.dataset.cat);
    });
  });

  // ── Colour swatches ───────────────────────
  document.querySelectorAll(".wv-swatch").forEach(btn => {
    btn.addEventListener("click", () => {
      const color = btn.dataset.color;
      if (activeColor === color) {
        activeColor = null;
        btn.classList.remove("active");
        resetGallery(currentQuery, currentQuery);
        return;
      }
      activeColor = color;
      document.querySelectorAll(".wv-swatch").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      searchInput.value = "";
      document.querySelectorAll(".wv-cat-btn").forEach(b => b.classList.remove("active"));
      gridTitle.textContent = btn.title + " tones";
      gallery.innerHTML = "";
      currentPage  = 1;
      currentQuery = "wallpaper";
      totalLoaded  = 0;
      loadMoreWithColor(color);
    });
  });

  async function loadMoreWithColor(color) {
    if (isLoading) return;
    isLoading = true;
    loader.style.display = "block";
    const results = await searchWallpapers(currentQuery, currentPage, false, color, activeWidth, activeHeight);
    results.forEach(item => gallery.appendChild(makeCard(item)));
    totalLoaded += results.length;
    wallCount.textContent = `${totalLoaded}+ wallpapers`;
    currentPage++;
    isLoading = false;
    loader.style.display = "none";
  }

  // ── Resolution filter ─────────────────────
  function applyResolution() {
    const val = document.getElementById("resFilter").value;
    if (!val) { activeWidth = null; activeHeight = null; }
    else {
      const [w, h] = val.split("x").map(Number);
      activeWidth = w; activeHeight = h;
    }
    gallery.classList.add("wv-masonry");
    gallery.style.cssText = "";
    gallery.innerHTML = "";
    currentPage = 1;
    totalLoaded = 0;
    loadMore();
  }

  // ── Modal ─────────────────────────────────
  function openModal(item) {
    currentItem = item;
    document.getElementById("modalImg").src = item.url;
    document.getElementById("modalSource").textContent = item.source || "";
    const favBtn = document.getElementById("modalFavBtn");
    favBtn.textContent = isFaved(item.id) ? "♥ Saved" : "♡ Save";
    favBtn.classList.toggle("saved", isFaved(item.id));
    document.getElementById("modalOverlay").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeModal() {
    document.getElementById("modalOverlay").classList.remove("open");
    document.getElementById("modalImg").src = "";
    document.body.style.overflow = "";
    currentItem = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById("modalOverlay")) closeModal();
  }

  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  function toggleModalFav() {
    if (!currentItem) return;
    const faved = toggleFav(currentItem);
    const btn = document.getElementById("modalFavBtn");
    btn.textContent = faved ? "♥ Saved" : "♡ Save";
    btn.classList.toggle("saved", faved);
  }

  // ── Download ──────────────────────────────
  async function downloadWall() {
    if (!currentItem) return;
    const btn = document.getElementById("downloadBtn");
    btn.textContent = "Downloading...";
    btn.disabled = true;

    try {
      let url = currentItem.url;
      if (currentItem.source === "Unsplash" && currentItem.download_url) {
        const res  = await fetch(currentItem.download_url, {
          headers: { Authorization: `Client-ID jG8I0T_9dNVF3p2zFjjjxdTHJi9l2cuzutlpiytWXfM` }
        });
        const data = await res.json();
        url = data.url;
      }
      const res  = await fetch(url);
      const blob = await res.blob();
      const a    = document.createElement("a");
      a.href     = URL.createObjectURL(blob);
      a.download = `wallverse-${currentItem.id}.jpg`;
      a.click();
      URL.revokeObjectURL(a.href);
      saveToHistory(currentItem);
      btn.textContent = "✓ Downloaded";
      setTimeout(() => { btn.textContent = "↓ Download"; btn.disabled = false; }, 2000);
    } catch {
      btn.textContent = "↓ Download";
      btn.disabled = false;
    }
  }

  // ── Favourites panel ──────────────────────
  function toggleFavView() {
    showingFavs = !showingFavs;
    const btn = document.getElementById("favToggle");
    btn.classList.toggle("active", showingFavs);

    if (showingFavs) {
      gallery.classList.remove("wv-masonry");
      gallery.style.cssText = "display:block;";
      gallery.innerHTML = "";
      emptyState.style.display = "none";
      gridTitle.textContent = "Saved & Downloaded";

      const favs = getFavs();
      const hist = getHistory();

      if (!favs.length && !hist.length) {
        wallCount.textContent = "";
        emptyState.style.display = "block";
        emptyState.innerHTML = '<i class="fas fa-heart"></i>Nothing here yet. Save or download wallpapers to see them here.';
        return;
      }

      wallCount.textContent = `${favs.length + hist.length} total`;

      if (favs.length) {
        const label = document.createElement("p");
        label.style.cssText = "font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;font-weight:600;margin-bottom:1rem;";
        label.textContent = `♥ Favourites · ${favs.length} saved`;
        gallery.appendChild(label);

        const favGrid = document.createElement("div");
        favGrid.style.cssText = "display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;margin-bottom:2.5rem;";
        favs.forEach(item => favGrid.appendChild(makeCard(item)));
        gallery.appendChild(favGrid);
      }

      if (hist.length) {
        const histLabel = document.createElement("div");
        histLabel.style.cssText = "display:flex;justify-content:space-between;align-items:center;font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;font-weight:600;margin-bottom:1rem;";
        histLabel.innerHTML = `<span>↓ Recently Downloaded · ${hist.length}</span><button class="wv-clear-history" onclick="clearHistory()">Clear</button>`;
        gallery.appendChild(histLabel);

        const histGrid = document.createElement("div");
        histGrid.style.cssText = "display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;";
        hist.forEach(item => histGrid.appendChild(makeCard(item)));
        gallery.appendChild(histGrid);
      }

    } else {
      gallery.style.cssText = "";
      gallery.classList.add("wv-masonry");
      resetGallery(currentQuery, currentQuery);
    }
  }

  function clearHistory() {
    localStorage.removeItem("wv_history");
    showingFavs = false;
    toggleFavView();
  }

  // ── Random wallpaper ──────────────────────
  const randomPool = ["nature","space","ocean","mountains","forest","city","abstract","aurora","desert","storm","waterfall","canyon","glacier","sunset","minimal"];

  async function showRandom() {
    const btn = document.getElementById("randomBtn");
    btn.textContent = "⏳ Loading...";
    btn.disabled = true;
    try {
      const query   = randomPool[Math.floor(Math.random() * randomPool.length)];
      const page    = Math.floor(Math.random() * 5) + 1;
      const results = await searchWallpapers(query, page);
      if (results.length) openModal(results[Math.floor(Math.random() * results.length)]);
    } catch {}
    finally {
      btn.textContent = "⚡ Random";
      btn.disabled = false;
    }
  }

  // ── Wallpaper of the Day ──────────────────
  async function renderWotd() {
    const pool  = ["mountains","ocean","forest","aurora","desert","waterfall","sunrise","storm","canyon","glacier","volcano","coral reef","savanna","fjord","milky way"];
    const now   = new Date();
    const day   = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
    const query = pool[day % pool.length];

    const results = await searchWallpapers(query, 1);
    if (!results.length) return;

    const item = results[Math.floor(Math.random() * Math.min(results.length, 5))];
    document.getElementById("wotd").innerHTML = `
      <div class="wv-wotd-inner" onclick='openModal(${JSON.stringify(item).replace(/'/g, "&#39;")})'>
        <img src="${item.url}" alt="Wallpaper of the Day">
        <div class="wv-wotd-overlay">
          <div class="wv-wotd-badge">Wallpaper of the Day</div>
          <div class="wv-wotd-title">${query.charAt(0).toUpperCase() + query.slice(1)}</div>
          <div class="wv-wotd-meta">Click to preview · ${item.source}</div>
        </div>
      </div>
    `;
  }

  // ── Infinite scroll ───────────────────────
  window.addEventListener("scroll", () => {
    if (!showingFavs &&
        window.innerHeight + window.scrollY >= document.body.offsetHeight - 400 &&
        !isLoading) {
      if (activeColor) loadMoreWithColor(activeColor);
      else loadMore();
    }
  });

  // ── Init ──────────────────────────────────
  renderWotd();
  loadMore();
</script>
</body>
</html>
