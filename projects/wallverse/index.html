<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WallVerse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../style.css">
</head>
<body>

<div style="max-width:1100px; margin:0 auto; padding:20px;">
  <a href="../../index.html" style="color: var(--text-secondary); text-decoration:none;">
    ← Back to Home
  </a>
</div>

<div class="container">
  <div class="card" style="padding: 24px; margin-bottom: 10px;">
    <h2>WallVerse</h2>
    <p class="subtitle">Discover beautiful wallpapers</p>
    <input
      type="text"
      id="search"
      class="input"
      placeholder="Search wallpapers..."
      style="width:100%; padding:10px; border-radius:10px; font-size:1rem;"
    >
    <div style="margin-top:15px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn" onclick="filterCategory('all')">All</button>
      <button class="btn" onclick="filterCategory('nature')">Nature</button>
      <button class="btn" onclick="filterCategory('city')">City</button>
      <button class="btn" onclick="filterCategory('anime')">Anime</button>
      <button class="btn" onclick="filterCategory('space')">Space</button>
      <button class="btn" onclick="filterCategory('abstract')">Abstract</button>
    </div>
  </div>

  <!-- GALLERY -->
  <div id="gallery" class="gallery"></div>

  <!-- LOADER -->
  <div id="loader" style="text-align:center; padding:20px; display:none;">
    <p style="color: var(--text-secondary);">Loading wallpapers...</p>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <span id="closeModal">&times;</span>
  <img id="modalImg" src="" alt="Wallpaper preview">
  <div class="modal-actions">
    <button id="downloadBtn" class="btn">Download</button>
  </div>
</div>

<footer>
  © 2026 ToolVerse | Built by Prince
</footer>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
