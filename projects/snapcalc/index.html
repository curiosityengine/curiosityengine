<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SnapCalc</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #d4f700;
      --accent-dim: rgba(212, 247, 0, 0.08);
      --text-primary: #f0f0f0;
      --text-muted: #444444;
      --text-dim: #2a2a2a;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-display);
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--text-dim) 1px, transparent 1px),
        linear-gradient(90deg, var(--text-dim) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    /* Accent glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,247,0,0.04) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-0: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 0;
    }

    /* Top badge */
    .badge {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(212,247,0,0.2);
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      margin-bottom: 2rem;
      animation: fadeDown 0.6s ease both;
    }

    /* Title */
    h1 {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 0.2em;
      animation: fadeDown 0.6s 0.1s ease both;
    }

    h1 span {
      color: var(--accent);
    }

    /* Subtitle */
    .subtitle {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 300;
      color: #555;
      letter-spacing: 0.05em;
      margin-bottom: 3rem;
      animation: fadeDown 0.6s 0.2s ease both;
    }

    /* Input container */
    .input-wrap {
      position: relative;
      width: 100%;
      max-width: 640px;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .input-wrap::before {
      content: '→';
      position: absolute;
      left: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-size: 1rem;
      pointer-events: none;
      font-family: var(--font-mono);
      transition: opacity 0.2s;
    }

    #inputBox {
      width: 100%;
      padding: 1.1rem 1.25rem 1.1rem 2.75rem;
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-primary);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      caret-color: var(--accent);
    }

    #inputBox::placeholder {
      color: #333;
      font-weight: 300;
    }

    #inputBox:focus {
      border-color: rgba(212,247,0,0.3);
      background: #141414;
      box-shadow: 0 0 0 3px rgba(212,247,0,0.05), 0 0 40px rgba(212,247,0,0.03);
    }

    /* Hint below input */
    .hint {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: #333;
      margin-top: 0.75rem;
      text-align: center;
      letter-spacing: 0.05em;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    /* Result */
    .result-wrap {
      margin-top: 3.5rem;
      text-align: center;
      animation: fadeUp 0.6s 0.4s ease both;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #result {
      font-size: clamp(3.5rem, 14vw, 7rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--accent);
      transition: opacity 0.15s, transform 0.15s;
      font-family: var(--font-display);
    }

    #result.idle {
      color: #1e1e1e;
      font-size: clamp(2rem, 8vw, 4rem);
    }

    #result.loading {
      color: #333;
      animation: pulse 1s ease infinite;
    }

    #result.error {
      color: #ff4444;
    }

    #result.pop {
      animation: pop 0.25s ease;
    }

    /* Corner decorations */
    .corner {
      position: fixed;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: #222;
      letter-spacing: 0.1em;
    }
    .corner.tl { top: 1.5rem; left: 1.5rem; }
    .corner.tr { top: 1.5rem; right: 1.5rem; text-align: right; }
    .corner.bl { bottom: 1.5rem; left: 1.5rem; }
    .corner.br { bottom: 1.5rem; right: 1.5rem; text-align: right; }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.7; }
    }
    @keyframes pop {
      0%   { transform: scale(0.94); opacity: 0.6; }
      60%  { transform: scale(1.03); }
      100% { transform: scale(1);    opacity: 1; }
    }

    /* Mobile tweaks */
    @media (max-width: 480px) {
      .corner { display: none; }
      .subtitle { display: none; }
    }
  </style>
</head>
<body>

  <!-- Corner labels -->
  <div class="corner tl">SNAP<br>CALC</div>
  <div class="corner tr">v2.0<br>AI</div>
  <div class="corner bl">FREE<br>FOREVER</div>
  <div class="corner br">GROQ<br>POWERED</div>

  <div class="wrapper">
    <div class="badge">instant calculator</div>

    <h1>Snap<span>Calc</span></h1>
    <p class="subtitle">type anything · get the answer · no fluff</p>

    <div class="input-wrap">
      <input
        id="inputBox"
        type="text"
        placeholder="1 kg mein kitna pound hota hai..."
        autocomplete="off"
        spellcheck="false"
        autofocus
      />
    </div>

    <p class="hint">press enter or just stop typing</p>

    <div class="result-wrap">
      <div id="result" class="idle">_</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
