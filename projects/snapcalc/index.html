<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SnapCalc</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
</head>

<body class="bg-black text-white flex items-center justify-center h-screen">

  <div class="w-full max-w-xl px-4">
    
    <h1 class="text-3xl text-center mb-6 font-semibold">
      SnapCalc
    </h1>

    <input 
      id="inputBox"
      type="text"
      placeholder="Type anything... (e.g. 1 kattha to sqft)"
      class="w-full p-4 text-lg rounded-xl bg-gray-900 border border-gray-700 focus:outline-none"
      autofocus
    />

    <div id="result" class="text-5xl text-center mt-10 font-bold">
      ...
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
