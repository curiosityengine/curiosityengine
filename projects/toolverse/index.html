<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ToolVerse — Discover the best AI tools for writing, coding, design, video, and more.">
  <title>ToolVerse — AI Tools Directory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="toolverse.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

<!-- NAVBAR -->
<nav class="tv-nav">
  <a href="../../index.html" class="tv-logo">Tool<span>Verse</span></a>
  <div class="tv-nav-right">
    <div class="tv-nav-search">
      <i class="fas fa-search"></i>
      <input type="text" id="navSearch" placeholder="Search tools..." oninput="handleSearch(this.value)">
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="tv-hero">
  <h1>Find the right<br><em>AI tool</em> for the job</h1>
  <div class="tv-hero-search">
    <i class="fas fa-search"></i>
    <input type="text" id="heroSearch" placeholder="Try ChatGPT, Midjourney, Cursor..." oninput="handleSearch(this.value)">
  </div>
</section>

<!-- USE-CASE STRIP -->
<div class="tv-usecase">
  <span class="tv-usecase-label">I want to</span>
  <button class="tv-usecase-btn" data-usecase="write">Write content</button>
  <button class="tv-usecase-btn" data-usecase="code">Build / Code</button>
  <button class="tv-usecase-btn" data-usecase="design">Design</button>
  <button class="tv-usecase-btn" data-usecase="create">Create videos</button>
  <button class="tv-usecase-btn" data-usecase="market">Market my business</button>
  <button class="tv-usecase-btn" data-usecase="research">Do research</button>
  <button class="tv-usecase-btn" data-usecase="organise">Stay organised</button>
</div>

<!-- AI RECOMMENDATION (collapsible) -->
<div class="tv-recommend-wrap">
  <button class="tv-recommend-toggle" id="recommendToggle" onclick="toggleRecommend()">
    <i class="fas fa-wand-magic-sparkles"></i> Not sure? Let AI pick for you
    <i class="fas fa-chevron-down"></i>
  </button>
  <div class="tv-recommend-box" id="recommendBox">
    <div class="tv-recommend-row">
      <input class="tv-recommend-input" id="recommendInput"
        placeholder="e.g. I want to edit product photos for my online store...">
      <button class="tv-recommend-btn" id="recommendBtn" onclick="getRecommendations()">Suggest →</button>
    </div>
    <div class="tv-recommend-chips" id="recommendChips"></div>
  </div>
</div>

<!-- CATEGORY BAR -->
<div class="tv-catbar-wrap">
  <div class="tv-catbar">
    <button class="tv-cat-btn active" data-cat="all">All</button>
    <button class="tv-cat-btn" data-cat="writing">Writing</button>
    <button class="tv-cat-btn" data-cat="image">Image</button>
    <button class="tv-cat-btn" data-cat="video">Video</button>
    <button class="tv-cat-btn" data-cat="coding">Coding</button>
    <button class="tv-cat-btn" data-cat="marketing">Marketing</button>
    <button class="tv-cat-btn" data-cat="productivity">Productivity</button>
  </div>
</div>

<!-- TOOLS GRID -->
<main class="tv-main">
  <div class="tv-grid-header">
    <span class="tv-grid-title" id="gridTitle">All Tools</span>
    <span class="tv-count" id="toolCount"></span>
  </div>
  <div class="tv-grid" id="toolsGrid"></div>
</main>

<!-- MODAL OVERLAY -->
<div class="tv-modal-overlay" id="modalOverlay" onclick="closeModal()"></div>

<!-- MODAL PANEL -->
<aside class="tv-modal" id="toolModal">
  <button class="tv-modal-close" onclick="closeModal()">
    <i class="fas fa-xmark"></i>
  </button>
  <div id="modalContent"></div>
</aside>

<!-- FOOTER -->
<footer class="tv-footer">© 2026 ToolVerse · Built by Prince</footer>

<script src="tools.js"></script>
<script>
  const WORKER_URL = "https://snapcalc.princemishra11.workers.dev";

  let activeCategory = "all";
  let activeUsecase  = null;
  let searchQuery    = "";

  // ── Init ──────────────────────────────────
  function init() {
    renderGrid();
    setupCatBtns();
    setupUsecaseBtns();
  }

  // ── Search ────────────────────────────────
  function handleSearch(val) {
    searchQuery = val.toLowerCase().trim();
    document.getElementById("heroSearch").value = val;
    document.getElementById("navSearch").value  = val;
    // Clear filters when searching
    if (searchQuery) {
      activeCategory = "all";
      activeUsecase  = null;
      document.querySelectorAll(".tv-cat-btn").forEach(b => b.classList.remove("active"));
      document.querySelector('[data-cat="all"]').classList.add("active");
      document.querySelectorAll(".tv-usecase-btn").forEach(b => b.classList.remove("active"));
    }
    renderGrid();
  }

  // ── Category buttons ──────────────────────
  function setupCatBtns() {
    document.querySelectorAll(".tv-cat-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tv-cat-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeCategory = btn.dataset.cat;
        activeUsecase  = null;
        searchQuery    = "";
        document.getElementById("heroSearch").value = "";
        document.getElementById("navSearch").value  = "";
        document.querySelectorAll(".tv-usecase-btn").forEach(b => b.classList.remove("active"));
        renderGrid();
      });
    });
  }

  // ── Use-case buttons ──────────────────────
  function setupUsecaseBtns() {
    document.querySelectorAll(".tv-usecase-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const uc = btn.dataset.usecase;
        if (activeUsecase === uc) {
          activeUsecase = null;
          btn.classList.remove("active");
        } else {
          document.querySelectorAll(".tv-usecase-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          activeUsecase  = uc;
          activeCategory = "all";
          searchQuery    = "";
          document.getElementById("heroSearch").value = "";
          document.getElementById("navSearch").value  = "";
          document.querySelectorAll(".tv-cat-btn").forEach(b => b.classList.remove("active"));
          document.querySelector('[data-cat="all"]').classList.add("active");
        }
        renderGrid();
      });
    });
  }

  // ── Render grid ───────────────────────────
  function renderGrid() {
    let filtered = TOOLS;

    if (searchQuery) {
      filtered = filtered.filter(t =>
        t.name.toLowerCase().includes(searchQuery) ||
        t.description.toLowerCase().includes(searchQuery) ||
        t.category.toLowerCase().includes(searchQuery)
      );
    } else if (activeUsecase) {
      filtered = filtered.filter(t => t.usecases.includes(activeUsecase));
    } else if (activeCategory !== "all") {
      filtered = filtered.filter(t => t.category === activeCategory);
    }

    document.getElementById("toolCount").textContent =
      `${filtered.length} tool${filtered.length !== 1 ? "s" : ""}`;

    const grid = document.getElementById("toolsGrid");

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="tv-no-results">No tools found — try a different search.</div>`;
      return;
    }

    grid.innerHTML = filtered.map((t, i) => `
      <div class="tv-card" style="animation-delay:${i * 0.03}s"
           onclick="openModal(${t.id})">
        <div class="tv-card-top">
          <img class="tv-card-logo" src="${t.logo}" alt="${t.name}"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="tv-card-logo-fallback" style="display:none">${t.name[0]}</div>
          <div>
            <div class="tv-card-name">${t.name}</div>
            <div class="tv-card-cat">${t.category}</div>
          </div>
        </div>
        <div class="tv-card-desc">${t.description}</div>
        <div class="tv-card-bottom">
          <div class="tv-card-meta">
            <div class="tv-card-rating"><i class="fas fa-star"></i> ${t.rating}</div>
            <span class="tv-pricing ${pricingClass(t.pricing)}">${t.pricing}</span>
          </div>
          <span class="tv-visit-btn">Visit →</span>
        </div>
      </div>
    `).join("");
  }

  function pricingClass(p) {
    if (p === "Free") return "pricing-free";
    if (p === "Paid") return "pricing-paid";
    return "pricing-freemium";
  }

  // ── Modal ─────────────────────────────────
  function openModal(id) {
  const tool = TOOLS.find(t => t.id === Number(id));
  if (!tool) return;
  const related = TOOLS.filter(t => t.category === tool.category && t.id !== tool.id)

    document.getElementById("modalContent").innerHTML = `
      <img class="tv-modal-logo" src="${tool.logo}" alt="${tool.name}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="tv-modal-logo-fallback" style="display:none">${tool.name[0]}</div>
      <div class="tv-modal-name">${tool.name}</div>
      <div class="tv-modal-cat">${tool.category}</div>
      <div class="tv-modal-meta">
        <div class="tv-card-rating"><i class="fas fa-star"></i> ${tool.rating}</div>
        <span class="tv-pricing ${pricingClass(tool.pricing)}">${tool.pricing}</span>
      </div>
      <div class="tv-modal-desc">${tool.fullDescription}</div>
      <div class="tv-modal-label">Features</div>
      <ul class="tv-modal-features">
        ${tool.features.map(f => `<li>${f}</li>`).join("")}
      </ul>
      <a href="${tool.url}" target="_blank" rel="noopener noreferrer"
         class="tv-modal-visit">Visit ${tool.name} →</a>
      ${related.length ? `
        <div class="tv-modal-label">Related Tools</div>
        <div class="tv-related-grid">
          ${related.map(r => `
            <div class="tv-related-item" onclick="openModal(${r.id})">
              <img class="tv-related-logo" src="${r.logo}" alt="${r.name}"
                onerror="this.src=''">
              <div>
                <div class="tv-related-name">${r.name}</div>
                <div class="tv-related-desc">${r.description}</div>
              </div>
            </div>
          `).join("")}
        </div>
      ` : ""}
    `;

    document.getElementById("modalOverlay").classList.add("open");
    document.getElementById("toolModal").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeModal() {
    document.getElementById("modalOverlay").classList.remove("open");
    document.getElementById("toolModal").classList.remove("open");
    document.body.style.overflow = "";
  }

  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  // ── AI Recommendation ─────────────────────
  function toggleRecommend() {
    const toggle = document.getElementById("recommendToggle");
    const box    = document.getElementById("recommendBox");
    toggle.classList.toggle("open");
    box.classList.toggle("open");
    if (box.classList.contains("open")) {
      document.getElementById("recommendInput").focus();
    }
  }

  async function getRecommendations() {
    const interest = document.getElementById("recommendInput").value.trim();
    if (!interest) return;

    const btn = document.getElementById("recommendBtn");
    btn.disabled = true;
    btn.textContent = "...";
    document.getElementById("recommendChips").innerHTML = "";

    try {
      const toolNames = TOOLS.map(t => t.name).join(", ");
      const res = await fetch(`${WORKER_URL}/api/recommend`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ interest, tools: toolNames }),
      });
      const data = await res.json();
      const names = data.recommendations ?? [];
      const chips = document.getElementById("recommendChips");

      if (names.length === 0) {
        chips.innerHTML = `<span style="font-size:0.78rem;color:var(--muted)">No matches found. Try rephrasing.</span>`;
      } else {
        chips.innerHTML = names.map(name => {
          const tool = TOOLS.find(t => t.name.toLowerCase() === name.toLowerCase());
          return tool
            ? `<button class="tv-recommend-chip" onclick='openModal(${JSON.stringify(tool)})'>${tool.name}</button>`
            : `<span class="tv-recommend-chip">${name}</span>`;
        }).join("");
      }
    } catch {
      document.getElementById("recommendChips").innerHTML =
        `<span style="font-size:0.78rem;color:var(--muted)">Something went wrong. Try again.</span>`;
    } finally {
      btn.disabled = false;
      btn.textContent = "Suggest →";
    }
  }

  document.getElementById("recommendInput")?.addEventListener("keydown", e => {
    if (e.key === "Enter") getRecommendations();
  });

  init();
</script>
</body>
</html>
