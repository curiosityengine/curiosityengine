<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ToolVerse — Discover the best AI tools for writing, coding, design, video, and more.">
  <title>ToolVerse — AI Tools Directory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="toolverse.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

<!-- NAVBAR -->
<nav class="tv-nav">
  <a href="index.html" class="tv-logo">Tool<span>Verse</span></a>
  <div class="tv-nav-right">
    <button class="tv-stack-nav-btn" id="stackNavBtn" onclick="toggleStackMode()">
      ⚡ Build My Stack
    </button>
    <div class="tv-nav-search">
      <i class="fas fa-search"></i>
      <input type="text" id="navSearch" placeholder="Search tools..." oninput="handleSearch(this.value)">
    </div>
  </div>
</nav>

<!-- STACK MODE BANNER -->
<div class="tv-stack-banner" id="stackBanner">
  <div class="tv-stack-banner-left">
    <span class="tv-stack-banner-label">⚡ Stack Builder</span>
    <span class="tv-stack-banner-hint">Pick up to 5 tools for your stack</span>
    <span class="tv-stack-count" id="stackCount">0 / 5</span>
  </div>
  <div class="tv-stack-banner-right">
    <button class="tv-stack-share-btn" id="stackShareBtn" onclick="openStackPanel()" disabled>
      Share Stack →
    </button>
    <button class="tv-stack-cancel-btn" onclick="toggleStackMode()">Cancel</button>
  </div>
</div>

<!-- HERO -->
<section class="tv-hero">
  <h1>Find the right<br><em>AI tool</em> for the job</h1>
</section>

<!-- TOOL OF THE DAY -->
<div class="tv-totd" id="toolOfDay"></div>
  
<!-- USE-CASE STRIP -->
<div class="tv-usecase">
  <span class="tv-usecase-label">I want to</span>
  <button class="tv-usecase-btn" data-usecase="write">Write content</button>
  <button class="tv-usecase-btn" data-usecase="code">Build / Code</button>
  <button class="tv-usecase-btn" data-usecase="design">Design</button>
  <button class="tv-usecase-btn" data-usecase="create">Create videos</button>
  <button class="tv-usecase-btn" data-usecase="market">Market my business</button>
  <button class="tv-usecase-btn" data-usecase="research">Do research</button>
  <button class="tv-usecase-btn" data-usecase="organise">Stay organised</button>
</div>

<!-- AI RECOMMENDATION -->
<div class="tv-recommend-wrap">
  <button class="tv-recommend-toggle" id="recommendToggle" onclick="toggleRecommend()">
    <i class="fas fa-wand-magic-sparkles"></i> Not sure? Let AI pick for you
    <i class="fas fa-chevron-down"></i>
  </button>
  <div class="tv-recommend-box" id="recommendBox">
    <div class="tv-recommend-row">
      <input class="tv-recommend-input" id="recommendInput"
        placeholder="e.g. I want to edit product photos for my online store...">
      <button class="tv-recommend-btn" id="recommendBtn" onclick="getRecommendations()">Suggest →</button>
    </div>
    <div class="tv-recommend-chips" id="recommendChips"></div>
  </div>
</div>

<!-- CATEGORY BAR -->
<div class="tv-catbar-wrap">
  <div class="tv-catbar">
    <button class="tv-cat-btn active" data-cat="all">All</button>
    <button class="tv-cat-btn" data-cat="writing">Writing</button>
    <button class="tv-cat-btn" data-cat="image">Image</button>
    <button class="tv-cat-btn" data-cat="video">Video</button>
    <button class="tv-cat-btn" data-cat="coding">Coding</button>
    <button class="tv-cat-btn" data-cat="marketing">Marketing</button>
    <button class="tv-cat-btn" data-cat="productivity">Productivity</button>
  </div>
</div>

<!-- TOOLS GRID -->
<main class="tv-main">
  <div class="tv-grid-header">
    <span class="tv-grid-title" id="gridTitle">All Tools</span>
    <span class="tv-count" id="toolCount"></span>
  </div>
  <div class="tv-grid" id="toolsGrid"></div>
</main>

<!-- MODAL OVERLAY -->
<div class="tv-modal-overlay" id="modalOverlay" onclick="closeModal()"></div>

<!-- MODAL PANEL -->
<aside class="tv-modal" id="toolModal">
  <button class="tv-modal-close" onclick="closeModal()">
    <i class="fas fa-xmark"></i>
  </button>
  <div id="modalContent"></div>
</aside>

<!-- FOOTER -->
<footer class="tv-footer">
  © 2026 ToolVerse · Built by Prince
  <span style="margin: 0 0.5rem; color: var(--border);">·</span>
  <a href="https://docs.google.com/forms/d/e/1FAIpQLSc4Pwyvr4aJWpmY6zDDA9YDkdL8R7F63BFBdpFAWn8lRFRoYg/viewform?usp=header"
     target="_blank" rel="noopener noreferrer"
     style="color: var(--accent); text-decoration: none; transition: opacity 0.15s;"
     onmouseover="this.style.opacity='0.7'"
     onmouseout="this.style.opacity='1'">
    Submit a Tool →
  </a>
</footer>
<!-- COMPARE BAR -->
<div class="tv-compare-bar" id="compareBar">
  <span class="tv-compare-bar-label">Compare</span>
  <div class="tv-compare-slots" id="compareSlots"></div>
  <button class="tv-compare-go-btn" id="compareGoBtn" onclick="openCompare()" disabled>Compare →</button>
  <button class="tv-compare-clear" onclick="clearCompare()">Clear</button>
</div>

<!-- COMPARE OVERLAY -->
<div class="tv-compare-overlay" id="compareOverlay" onclick="closeCompare()"></div>

<!-- COMPARE PANEL -->
<div class="tv-compare-panel" id="comparePanel">
  <div class="tv-compare-panel-inner">
    <div class="tv-compare-panel-header">
      <span class="tv-compare-panel-title">Comparing tools</span>
      <button class="tv-compare-close" onclick="closeCompare()">
        <i class="fas fa-xmark"></i>
      </button>
    </div>
    <div id="compareTable"></div>
  </div>
</div>

<!-- STACK OVERLAY -->
<div class="tv-stack-overlay" id="stackOverlay" onclick="closeStackPanel()"></div>

<!-- STACK PANEL -->
<div class="tv-stack-panel" id="stackPanel">
  <div class="tv-stack-panel-inner">
    <div class="tv-stack-panel-header">
      <div>
        <div class="tv-stack-panel-title">⚡ My AI Stack</div>
        <div class="tv-stack-panel-subtitle" id="stackPanelSubtitle"></div>
      </div>
      <button class="tv-stack-panel-close" onclick="closeStackPanel()">
        <i class="fas fa-xmark"></i>
      </button>
    </div>
    <div class="tv-shared-stack-banner" id="sharedStackBanner">
      <i class="fas fa-share-nodes"></i>
      <span class="tv-shared-stack-banner-text" id="sharedStackText"></span>
    </div>
    <div class="tv-stack-list" id="stackList"></div>
    <div class="tv-stack-share-row" id="stackShareRow">
      <span class="tv-stack-url" id="stackUrl"></span>
      <button class="tv-stack-copy-btn" id="stackCopyBtn" onclick="copyStackUrl()">
        Copy Link
      </button>
    </div>
  </div>
</div>

<script src="tools.js"></script>
<script>
  const WORKER_URL = "https://snapcalc.princemishra11.workers.dev";

  let activeCategory = "all";
  let activeUsecase  = null;
  let searchQuery    = "";
  let compareList    = [];
  let stackList      = [];
  let stackMode      = false;

  // ── Init ──────────────────────────────────
  function init() {
    renderGrid();
    setupCatBtns();
    setupUsecaseBtns();
    checkUrlParams();
  }

  // ── URL param handler ─────────────────────
  function checkUrlParams() {
    const params = new URLSearchParams(location.search);
    const toolId  = params.get("tool");
    const stackParam = params.get("stack");

    if (stackParam) {
      // Someone opened a shared stack link
      const ids = stackParam.split(",").map(Number).filter(Boolean);
      const tools = ids.map(id => TOOLS.find(t => t.id === id)).filter(Boolean);
      if (tools.length) openSharedStack(tools);
    } else if (toolId) {
      openModal(Number(toolId));
    }
  }

  // ── Search ────────────────────────────────
  function handleSearch(val) {
    searchQuery = val.toLowerCase().trim();
    document.getElementById("navSearch").value = val;
    if (searchQuery) {
      activeCategory = "all";
      activeUsecase  = null;
      document.querySelectorAll(".tv-cat-btn").forEach(b => b.classList.remove("active"));
      document.querySelector('[data-cat="all"]').classList.add("active");
      document.querySelectorAll(".tv-usecase-btn").forEach(b => b.classList.remove("active"));
    }
    renderGrid();
  }

  // ── Category buttons ──────────────────────
  function setupCatBtns() {
    document.querySelectorAll(".tv-cat-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tv-cat-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeCategory = btn.dataset.cat;
        activeUsecase  = null;
        searchQuery    = "";
        document.getElementById("navSearch").value = "";
        document.querySelectorAll(".tv-usecase-btn").forEach(b => b.classList.remove("active"));
        renderGrid();
      });
    });
  }

  // ── Use-case buttons ──────────────────────
  function setupUsecaseBtns() {
    document.querySelectorAll(".tv-usecase-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const uc = btn.dataset.usecase;
        if (activeUsecase === uc) {
          activeUsecase = null;
          btn.classList.remove("active");
        } else {
          document.querySelectorAll(".tv-usecase-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          activeUsecase  = uc;
          activeCategory = "all";
          searchQuery    = "";
          document.getElementById("navSearch").value = "";
          document.querySelectorAll(".tv-cat-btn").forEach(b => b.classList.remove("active"));
          document.querySelector('[data-cat="all"]').classList.add("active");
        }
        renderGrid();
      });
    });
  }

  // ── Render grid ───────────────────────────
  function renderGrid() {
    let filtered = TOOLS;

    if (searchQuery) {
      filtered = filtered.filter(t =>
        t.name.toLowerCase().includes(searchQuery) ||
        t.description.toLowerCase().includes(searchQuery) ||
        t.category.toLowerCase().includes(searchQuery)
      );
    } else if (activeUsecase) {
      filtered = filtered.filter(t => t.usecases.includes(activeUsecase));
    } else if (activeCategory !== "all") {
      filtered = filtered.filter(t => t.category === activeCategory);
    }

    document.getElementById("toolCount").textContent =
      `${filtered.length} tool${filtered.length !== 1 ? "s" : ""}`;

    const grid = document.getElementById("toolsGrid");

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="tv-no-results">No tools found — try a different search.</div>`;
      return;
    }

    grid.innerHTML = filtered.map((t, i) => `
      <div class="tv-card ${stackList.includes(t.id) ? "stack-selected" : ""}"
           style="animation-delay:${i * 0.03}s"
           onclick="handleCardClick(${t.id})">
        <div class="tv-card-top">
          <img class="tv-card-logo" src="${t.logo}" alt="${t.name}"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="tv-card-logo-fallback" style="display:none">${t.name[0]}</div>
          <div>
            <div class="tv-card-name">${t.name}</div>
            <div class="tv-card-cat">${t.category}</div>
          </div>
        </div>
        <div class="tv-card-desc">${t.description}</div>
        <div class="tv-card-bottom">
          <div class="tv-card-meta">
            <div class="tv-card-rating"><i class="fas fa-star"></i> ${t.rating}</div>
            <span class="tv-pricing ${pricingClass(t.pricing)}">${t.pricing}</span>
          </div>
          <div class="tv-card-actions">
            <button class="tv-stack-pick-btn" id="spk-${t.id}"
              onclick="event.stopPropagation(); toggleStack(${t.id})">
              ${stackList.includes(t.id) ? "✓ In Stack" : "+ Stack"}
            </button>
            <button class="tv-compare-btn" id="cmp-${t.id}"
              onclick="event.stopPropagation(); toggleCompare(${t.id})">+ Compare</button>
            <span class="tv-visit-btn">Visit →</span>
          </div>
        </div>
      </div>
    `).join("");
  }

  function pricingClass(p) {
    if (p === "Free") return "pricing-free";
    if (p === "Paid") return "pricing-paid";
    return "pricing-freemium";
  }

  // Card click — in stack mode picks tool, otherwise opens modal
  function handleCardClick(id) {
    if (stackMode) {
      toggleStack(id);
    } else {
      openModal(id);
    }
  }

  // ── Modal ─────────────────────────────────
  function openModal(id) {
  const tool = TOOLS.find(t => t.id === Number(id));
  if (!tool) return;

  // Close stack panel if open so modal can appear on top
  document.getElementById("stackOverlay").classList.remove("open");
  document.getElementById("stackPanel").classList.remove("open");

  history.pushState({}, "", `?tool=${id}`);
    const related = TOOLS.filter(t => t.category === tool.category && t.id !== tool.id).slice(0, 3);

    document.getElementById("modalContent").innerHTML = `
      <img class="tv-modal-logo" src="${tool.logo}" alt="${tool.name}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="tv-modal-logo-fallback" style="display:none">${tool.name[0]}</div>
      <div class="tv-modal-name">${tool.name}</div>
      <div class="tv-modal-cat">${tool.category}</div>
      <div class="tv-modal-meta">
        <div class="tv-card-rating"><i class="fas fa-star"></i> ${tool.rating}</div>
        <span class="tv-pricing ${pricingClass(tool.pricing)}">${tool.pricing}</span>
      </div>
      <div class="tv-modal-desc">${tool.fullDescription}</div>
      <div class="tv-modal-label">Features</div>
      <ul class="tv-modal-features">
        ${tool.features.map(f => `<li>${f}</li>`).join("")}
      </ul>
      <a href="${tool.url}" target="_blank" rel="noopener noreferrer"
         class="tv-modal-visit">Visit ${tool.name} →</a>
      <button class="tv-share-btn" onclick="shareTool(${tool.id})">↗ Share this tool</button>
      ${related.length ? `
        <div class="tv-modal-label">Related Tools</div>
        <div class="tv-related-grid">
          ${related.map(r => `
            <div class="tv-related-item" onclick="openModal(${r.id})">
              <img class="tv-related-logo" src="${r.logo}" alt="${r.name}" onerror="this.src=''">
              <div>
                <div class="tv-related-name">${r.name}</div>
                <div class="tv-related-desc">${r.description}</div>
              </div>
            </div>
          `).join("")}
        </div>
      ` : ""}
    `;

    document.getElementById("modalOverlay").classList.add("open");
    document.getElementById("toolModal").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeModal() {
    document.getElementById("modalOverlay").classList.remove("open");
    document.getElementById("toolModal").classList.remove("open");
    document.body.style.overflow = "";
    history.pushState({}, "", location.pathname);
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") { closeModal(); closeCompare(); closeStackPanel(); }
  });

  // ── Share tool ────────────────────────────
  function shareTool(id) {
    const url = `${location.origin}${location.pathname}?tool=${id}`;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector(".tv-share-btn");
      const orig = btn.textContent;
      btn.textContent = "✓ Link copied!";
      setTimeout(() => btn.textContent = orig, 2000);
    });
  }

  // ── AI Recommendation ─────────────────────
  function toggleRecommend() {
    const toggle = document.getElementById("recommendToggle");
    const box    = document.getElementById("recommendBox");
    toggle.classList.toggle("open");
    box.classList.toggle("open");
    if (box.classList.contains("open")) {
      document.getElementById("recommendInput").focus();
    }
  }

  async function getRecommendations() {
    const interest = document.getElementById("recommendInput").value.trim();
    if (!interest) return;
    const btn = document.getElementById("recommendBtn");
    btn.disabled = true;
    btn.textContent = "...";
    document.getElementById("recommendChips").innerHTML = "";
    try {
      const toolNames = TOOLS.map(t => t.name).join(", ");
      const res = await fetch(`${WORKER_URL}/api/recommend`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ interest, tools: toolNames }),
      });
      const data = await res.json();
      const names = data.recommendations ?? [];
      const chips = document.getElementById("recommendChips");
      if (names.length === 0) {
        chips.innerHTML = `<span style="font-size:0.78rem;color:var(--muted)">No matches found. Try rephrasing.</span>`;
      } else {
        chips.innerHTML = names.map(name => {
          const tool = TOOLS.find(t => t.name.toLowerCase() === name.toLowerCase());
          return tool
            ? `<button class="tv-recommend-chip" onclick="openModal(${tool.id})">${tool.name}</button>`
            : `<span class="tv-recommend-chip">${name}</span>`;
        }).join("");
      }
    } catch {
      document.getElementById("recommendChips").innerHTML =
        `<span style="font-size:0.78rem;color:var(--muted)">Something went wrong. Try again.</span>`;
    } finally {
      btn.disabled = false;
      btn.textContent = "Suggest →";
    }
  }

  document.getElementById("recommendInput")?.addEventListener("keydown", e => {
    if (e.key === "Enter") getRecommendations();
  });

  // ── Compare ───────────────────────────────
  function toggleCompare(id) {
    if (compareList.includes(id)) {
      compareList = compareList.filter(x => x !== id);
    } else {
      if (compareList.length >= 2) compareList[1] = id;
      else compareList.push(id);
    }
    updateCompareBar();
  }

  function updateCompareBar() {
    const bar   = document.getElementById("compareBar");
    const goBtn = document.getElementById("compareGoBtn");
    document.querySelectorAll(".tv-compare-btn").forEach(btn => {
      const id = Number(btn.id.replace("cmp-", ""));
      btn.classList.toggle("selected", compareList.includes(id));
      btn.textContent = compareList.includes(id) ? "✓ Added" : "+ Compare";
    });
    const slots = document.getElementById("compareSlots");
    slots.innerHTML = [0, 1].map(i => {
      const tool = compareList[i] ? TOOLS.find(t => t.id === compareList[i]) : null;
      if (tool) {
        return `<div class="tv-compare-slot">
          <img src="${tool.logo}" alt="${tool.name}" onerror="this.style.display='none'">
          <span class="tv-compare-slot-name">${tool.name}</span>
          <button class="tv-compare-slot-remove" onclick="toggleCompare(${tool.id})">✕</button>
        </div>`;
      }
      return `<div class="tv-compare-slot empty">Pick a tool</div>`;
    }).join("");
    bar.classList.toggle("visible", compareList.length > 0);
    goBtn.disabled = compareList.length < 2;
  }

  function clearCompare() {
    compareList = [];
    updateCompareBar();
    document.getElementById("compareBar").classList.remove("visible");
  }

  function openCompare() {
    if (compareList.length < 2) return;
    const [a, b] = compareList.map(id => TOOLS.find(t => t.id === id));
    const rows = [
      { label: "Category", a: a.category, b: b.category, winner: null },
      { label: "Pricing", a: a.pricing, b: b.pricing,
        winner: ["Free","Freemium","Paid"].indexOf(a.pricing) <=
                ["Free","Freemium","Paid"].indexOf(b.pricing) ? "a" : "b" },
      { label: "Rating", a: "⭐ " + a.rating, b: "⭐ " + b.rating,
        winner: a.rating >= b.rating ? "a" : "b" },
      { label: "Features", aList: a.features, bList: b.features, winner: null },
      { label: "Visit", aLink: a.url, bLink: b.url, aName: a.name, bName: b.name, winner: null }
    ];
    document.getElementById("compareTable").innerHTML = `
      <div class="tv-compare-table">
        <div class="tv-ct-cell tv-ct-label"></div>
        <div class="tv-ct-cell tv-ct-head">
          <img src="${a.logo}" alt="${a.name}" onerror="this.style.display='none'">
          <div><div class="tv-ct-head-name">${a.name}</div><div class="tv-ct-head-cat">${a.category}</div></div>
        </div>
        <div class="tv-ct-cell tv-ct-head">
          <img src="${b.logo}" alt="${b.name}" onerror="this.style.display='none'">
          <div><div class="tv-ct-head-name">${b.name}</div><div class="tv-ct-head-cat">${b.category}</div></div>
        </div>
        ${rows.map((row, i) => {
          const alt = i % 2 === 0 ? "" : "alt";
          if (row.aList) return `
            <div class="tv-ct-cell tv-ct-label">${row.label}</div>
            <div class="tv-ct-cell tv-ct-value ${alt}"><ul class="tv-ct-features">${row.aList.map(f=>`<li>${f}</li>`).join("")}</ul></div>
            <div class="tv-ct-cell tv-ct-value ${alt}"><ul class="tv-ct-features">${row.bList.map(f=>`<li>${f}</li>`).join("")}</ul></div>`;
          if (row.aLink) return `
            <div class="tv-ct-cell tv-ct-label">${row.label}</div>
            <div class="tv-ct-cell tv-ct-value ${alt}"><a href="${row.aLink}" target="_blank" rel="noopener noreferrer" class="tv-ct-visit">Visit ${row.aName} →</a></div>
            <div class="tv-ct-cell tv-ct-value ${alt}"><a href="${row.bLink}" target="_blank" rel="noopener noreferrer" class="tv-ct-visit">Visit ${row.bName} →</a></div>`;
          return `
            <div class="tv-ct-cell tv-ct-label">${row.label}</div>
            <div class="tv-ct-cell tv-ct-value ${alt} ${row.winner==="a"?"tv-ct-winner":""}">${row.a}</div>
            <div class="tv-ct-cell tv-ct-value ${alt} ${row.winner==="b"?"tv-ct-winner":""}">${row.b}</div>`;
        }).join("")}
      </div>`;
    document.getElementById("compareOverlay").classList.add("open");
    document.getElementById("comparePanel").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeCompare() {
    document.getElementById("compareOverlay").classList.remove("open");
    document.getElementById("comparePanel").classList.remove("open");
    document.body.style.overflow = "";
  }

  // ── Stack Builder ─────────────────────────
  function toggleStackMode() {
    stackMode = !stackMode;
    const btn    = document.getElementById("stackNavBtn");
    const banner = document.getElementById("stackBanner");
    const grid   = document.getElementById("toolsGrid");

    btn.classList.toggle("active", stackMode);
    banner.classList.toggle("visible", stackMode);
    grid.classList.toggle("stack-mode", stackMode);

    if (!stackMode) {
      stackList = [];
      updateStackUI();
    }
    renderGrid();
  }

  function toggleStack(id) {
    if (stackList.includes(id)) {
      stackList = stackList.filter(x => x !== id);
    } else {
      if (stackList.length >= 5) return; // max 5
      stackList.push(id);
    }
    updateStackUI();
    renderGrid();
  }

  function updateStackUI() {
    const count  = document.getElementById("stackCount");
    const shareBtn = document.getElementById("stackShareBtn");
    count.textContent = `${stackList.length} / 5`;
    shareBtn.disabled = stackList.length === 0;
  }

  function openStackPanel() {
    const tools = stackList.map(id => TOOLS.find(t => t.id === id)).filter(Boolean);
    if (!tools.length) return;

    const stackUrl = `${location.origin}${location.pathname}?stack=${stackList.join(",")}`;

    document.getElementById("stackPanelSubtitle").textContent =
      `${tools.length} tool${tools.length !== 1 ? "s" : ""} curated by you`;

    document.getElementById("sharedStackBanner").classList.remove("visible");

    document.getElementById("stackList").innerHTML = tools.map((tool, i) => `
      <div class="tv-stack-item" onclick="openModal(${tool.id})">
        <span class="tv-stack-item-num">${i + 1}</span>
        <img class="tv-stack-item-logo" src="${tool.logo}" alt="${tool.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="tv-stack-item-logo-fallback" style="display:none">${tool.name[0]}</div>
        <div class="tv-stack-item-info">
          <div class="tv-stack-item-name">${tool.name}</div>
          <div class="tv-stack-item-desc">${tool.description}</div>
        </div>
        <span class="tv-stack-item-pricing ${pricingClass(tool.pricing)}">${tool.pricing}</span>
      </div>
    `).join("");

    document.getElementById("stackUrl").textContent = stackUrl;
    document.getElementById("stackShareRow").style.display = "flex";

    document.getElementById("stackOverlay").classList.add("open");
    document.getElementById("stackPanel").classList.add("open");
    document.body.style.overflow = "hidden";

    history.pushState({}, "", `?stack=${stackList.join(",")}`);
  }

  function openSharedStack(tools) {
    document.getElementById("stackPanelSubtitle").textContent =
      `${tools.length} tool${tools.length !== 1 ? "s" : ""} in this stack`;

    document.getElementById("sharedStackBanner").classList.add("visible");
    document.getElementById("sharedStackText").innerHTML =
      `<strong>Someone shared their AI stack with you.</strong> Click any tool to learn more.`;

    document.getElementById("stackList").innerHTML = tools.map((tool, i) => `
      <div class="tv-stack-item" onclick="openModal(${tool.id})">
        <span class="tv-stack-item-num">${i + 1}</span>
        <img class="tv-stack-item-logo" src="${tool.logo}" alt="${tool.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="tv-stack-item-logo-fallback" style="display:none">${tool.name[0]}</div>
        <div class="tv-stack-item-info">
          <div class="tv-stack-item-name">${tool.name}</div>
          <div class="tv-stack-item-desc">${tool.description}</div>
        </div>
        <span class="tv-stack-item-pricing ${pricingClass(tool.pricing)}">${tool.pricing}</span>
      </div>
    `).join("");

    document.getElementById("stackShareRow").style.display = "none";

    document.getElementById("stackOverlay").classList.add("open");
    document.getElementById("stackPanel").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeStackPanel() {
    document.getElementById("stackOverlay").classList.remove("open");
    document.getElementById("stackPanel").classList.remove("open");
    document.body.style.overflow = "";
    history.pushState({}, "", location.pathname);
  }

  function copyStackUrl() {
    const url = `${location.origin}${location.pathname}?stack=${stackList.join(",")}`;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById("stackCopyBtn");
      btn.textContent = "✓ Copied!";
      setTimeout(() => btn.textContent = "Copy Link", 2000);
    });
  }

  init();
  // ── Tool of the Day ───────────────────────
function renderToolOfDay() {
  const now   = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const diff  = now - start;
  const oneDay = 1000 * 60 * 60 * 24;
  const dayOfYear = Math.floor(diff / oneDay);
  const tool = TOOLS[dayOfYear % TOOLS.length];

  document.getElementById("toolOfDay").innerHTML = `
    <div class="tv-totd-inner" onclick="openModal(${tool.id})">
      <span class="tv-totd-badge">⚡ Tool of the Day</span>
      <img class="tv-totd-logo" src="${tool.logo}" alt="${tool.name}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="tv-totd-logo-fallback" style="display:none">${tool.name[0]}</div>
      <div class="tv-totd-info">
        <div class="tv-totd-name">${tool.name}</div>
        <div class="tv-totd-desc">${tool.description}</div>
      </div>
      <div class="tv-totd-meta">
        <div class="tv-card-rating"><i class="fas fa-star"></i> ${tool.rating}</div>
        <span class="tv-pricing ${pricingClass(tool.pricing)}">${tool.pricing}</span>
      </div>
    </div>
  `;
}

renderToolOfDay();
</script>
</body>
</html>
