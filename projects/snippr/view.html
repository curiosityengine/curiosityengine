<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snippr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="snippr.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

<nav class="sn-nav">
  <a href="index.html" class="sn-logo">Snip<span>pr</span></a>
  <div class="sn-nav-right">
  <a href="diff.html" class="sn-new-btn">⟷ Diff</a>
  <a href="index.html" class="sn-new-btn">+ New Snippet</a>
</div>
</nav>

<!-- PASSWORD GATE -->
<div class="sn-gate" id="passwordGate" style="display:none">
  <div class="sn-gate-card">
    <div class="sn-gate-icon">🔒</div>
    <h2>Password Protected</h2>
    <p>This snippet is protected. Enter the password to view it.</p>
    <div class="sn-pass-wrap">
      <input type="password" id="gatePassword" placeholder="Enter password...">
      <button class="sn-pass-toggle" onclick="toggleGatePass()" type="button">👁</button>
    </div>
    <p class="sn-gate-error" id="gateError"></p>
    <button class="sn-submit" onclick="unlockPaste()">Unlock →</button>
  </div>
</div>

<!-- MAIN VIEW -->
<main class="sn-main" id="pasteView" style="display:none">

  <div class="sn-view-header">
    <div>
      <h1 id="pasteTitle" class="sn-view-title"></h1>
      <div class="sn-view-meta" id="pasteMeta"></div>
    </div>
    <div class="sn-view-actions">
      <button class="sn-action-btn" id="copyContentBtn" onclick="copyContent()">Copy Code</button>
      <button class="sn-action-btn" id="copyLinkBtn" onclick="copyLink()">Copy Link</button>
    </div>
  </div>

  <!-- SHARE + QR CARD -->
  <div class="sn-share-card">
  <div class="sn-share-url-wrap">
    <input class="sn-share-url" id="shareUrl" readonly>
    <button class="sn-copy-btn" onclick="copyLink()">Copy</button>
  </div>
  <div class="sn-share-body">
    <div class="sn-share-left">
      <p class="sn-share-label">Share via</p>
      <div class="sn-share-btns">
        <a id="waLink" href="#" target="_blank" class="sn-share-btn sn-wa">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M20.52 3.48A11.94 11.94 0 0 0 12 0C5.37 0 0 5.37 0 12c0 2.12.56 4.2 1.62 6.03L0 24l6.18-1.62A11.94 11.94 0 0 0 12 24c6.63 0 12-5.37 12-12 0-3.2-1.25-6.2-3.48-8.52zM12 21.82a9.82 9.82 0 0 1-5.02-1.38l-.36-.21-3.67.96.98-3.58-.23-.37A9.79 9.79 0 1 1 12 21.82zm5.43-7.37c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.95 1.17-.17.2-.35.22-.65.07-.3-.15-1.27-.47-2.42-1.5-.89-.8-1.5-1.79-1.67-2.09-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.6-.92-2.2-.24-.58-.48-.5-.67-.51l-.57-.01c-.2 0-.52.07-.8.37-.27.3-1.05 1.03-1.05 2.5 0 1.47 1.07 2.9 1.22 3.1.15.2 2.1 3.2 5.1 4.49.71.3 1.26.48 1.7.62.71.22 1.36.19 1.87.12.57-.08 1.76-.72 2.01-1.42.25-.7.25-1.3.17-1.42-.07-.12-.27-.2-.57-.35z"/></svg>
          WhatsApp
        </a>
        <a id="tgLink" href="#" target="_blank" class="sn-share-btn sn-tg">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M9.04 15.53l-.39 5.48c.56 0 .8-.24 1.09-.53l2.62-2.5 5.43 3.97c1 .55 1.71.26 1.97-.92l3.58-16.77c.31-1.44-.52-2.01-1.5-1.65L1.56 9.44c-1.38.54-1.36 1.31-.23 1.66l5.1 1.59L18.9 5.36c.59-.39 1.13-.17.68.22"/></svg>
          Telegram
        </a>
        <a id="twLink" href="#" target="_blank" class="sn-share-btn sn-tw">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M22 5.92c-.77.34-1.6.57-2.47.67a4.3 4.3 0 0 0 1.88-2.37 8.59 8.59 0 0 1-2.72 1.04 4.28 4.28 0 0 0-7.3 3.9 12.14 12.14 0 0 1-8.82-4.47 4.28 4.28 0 0 0 1.32 5.72 4.25 4.25 0 0 1-1.94-.54v.05a4.28 4.28 0 0 0 3.43 4.2 4.3 4.3 0 0 1-1.93.07 4.28 4.28 0 0 0 4 2.97A8.59 8.59 0 0 1 2 19.54 12.12 12.12 0 0 0 8.56 21c7.27 0 11.25-6.02 11.25-11.25 0-.17 0-.34-.01-.51A8.05 8.05 0 0 0 22 5.92z"/></svg>
          Twitter
        </a>
        <a id="emLink" href="#" class="sn-share-btn sn-em">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M20 4H4a2 2 0 0 0-2 2v.01L12 13l10-6.99V6a2 2 0 0 0-2-2zM2 8v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-10 7L2 8z"/></svg>
          Email
        </a>
      </div>
    </div>
    <div class="sn-share-right">
      <canvas id="qrCanvas"></canvas>
      <button class="sn-qr-download" onclick="downloadQR()">Download QR</button>
    </div>
  </div>
</div>

  <!-- CODE BLOCK -->
  <div class="sn-code-card">
    <div class="sn-code-header">
      <span class="sn-lang-badge" id="langBadge"></span>
      <button class="sn-copy-inline" onclick="copyContent()">Copy</button>
    </div>
    <pre><code id="codeBlock"></code></pre>
  </div>

</main>

<div class="sn-loader" id="loader">
  <div class="sn-loader-dot"></div>
  <div class="sn-loader-dot"></div>
  <div class="sn-loader-dot"></div>
</div>

<footer class="sn-footer">© 2026 Snippr · Built by Prince</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script>
  const SUPABASE_URL = "https://tbygaanjbsfutsixpbnj.supabase.co";
  const SUPABASE_KEY = "sb_publishable_lHVoDfC4d6t9J24igd3jvA_zhM4ZT07";
  const WORKER_URL   = "https://snapcalc.princemishra11.workers.dev";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const code = new URLSearchParams(location.search).get("code");
  let pasteData = null;

  // ── URL Shortener ─────────────────────────
  async function shortenUrl(longUrl) {
    try {
      const res = await fetch(`${WORKER_URL}/api/shorten`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: longUrl }),
      });
      const data = await res.json();
      return data.short || longUrl;
    } catch {
      return longUrl;
    }
  }

  // ── Load paste ────────────────────────────
  async function loadPaste() {
    if (!code) { window.location.href = "index.html"; return; }

    const { data, error } = await sb
      .from("pastes")
      .select("*")
      .eq("short_code", code)
      .single();

    document.getElementById("loader").style.display = "none";

    if (error || !data) {
      document.body.innerHTML += `<div class="sn-error">Snippet not found or has expired.</div>`;
      return;
    }

    if (data.expiry && new Date(data.expiry) < new Date()) {
      document.body.innerHTML += `<div class="sn-error">This snippet has expired.</div>`;
      return;
    }

    pasteData = data;

    if (data.password_hash) {
      document.getElementById("passwordGate").style.display = "flex";
    } else {
      await renderPaste(data);
    }
  }

  // ── Render paste ──────────────────────────
  async function renderPaste(data) {
    document.title = `${data.title || "Untitled"} — Snippr`;

    const longUrl  = `${location.origin}${location.pathname}?code=${code}`;
    const shortUrl = await shortenUrl(longUrl);

    document.getElementById("pasteTitle").textContent = data.title || "Untitled";
    document.getElementById("pasteMeta").innerHTML = `
      <span>👁 ${data.views + 1} views</span>
      <span>·</span>
      <span>${timeAgo(data.created_at)}</span>
      <span>·</span>
      <span class="sn-vis-badge">${data.visibility}</span>
      ${data.expiry ? `<span>·</span><span>Expires ${timeAgo(data.expiry, true)}</span>` : ""}
    `;

    document.getElementById("shareUrl").value = shortUrl;
    document.getElementById("waLink").href = `https://wa.me/?text=${encodeURIComponent(shortUrl)}`;
    document.getElementById("tgLink").href = `https://t.me/share/url?url=${encodeURIComponent(shortUrl)}`;
    document.getElementById("twLink").href = `https://twitter.com/intent/tweet?url=${encodeURIComponent(shortUrl)}`;
    document.getElementById("emLink").href = `mailto:?subject=${encodeURIComponent(data.title || "Snippet")}&body=${encodeURIComponent(shortUrl)}`;

    const block = document.getElementById("codeBlock");
    block.textContent = data.content;
    block.className = data.language !== "plaintext" ? `language-${data.language}` : "";
    document.getElementById("langBadge").textContent = data.language || "plaintext";
    hljs.highlightElement(block);

    generateQR(shortUrl);

    sb.from("pastes").update({ views: data.views + 1 }).eq("short_code", code);

    document.getElementById("pasteView").style.display = "block";
  }

  // ── Password unlock ───────────────────────
  async function unlockPaste() {
    const pass = document.getElementById("gatePassword").value;
    const hash = await hashPassword(pass);
    if (hash === pasteData.password_hash) {
      document.getElementById("passwordGate").style.display = "none";
      await renderPaste(pasteData);
    } else {
      document.getElementById("gateError").textContent = "Incorrect password.";
    }
  }

  async function hashPassword(pass) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pass));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  // ── QR Code ───────────────────────────────
  function generateQR(url) {
    new QRious({
      element: document.getElementById("qrCanvas"),
      value: url,
      size: 160,
      backgroundAlpha: 1,
      background: "#0a0a0a",
      foreground: "#ffffff",
      level: "M"
    });
  }

  function downloadQR() {
    const canvas = document.getElementById("qrCanvas");
    const a = document.createElement("a");
    a.download = "snippr-qr.png";
    a.href = canvas.toDataURL();
    a.click();
  }

  // ── Copy helpers ──────────────────────────
  function copyContent() {
    navigator.clipboard.writeText(pasteData?.content || "");
    flashBtn("copyContentBtn", "Copied!");
  }

  function copyLink() {
    navigator.clipboard.writeText(document.getElementById("shareUrl").value);
    flashBtn("copyLinkBtn", "Copied!");
  }

  function flashBtn(id, text) {
    const btn = document.getElementById(id);
    if (!btn) return;
    const orig = btn.textContent;
    btn.textContent = text;
    setTimeout(() => btn.textContent = orig, 2000);
  }

  function toggleGatePass() {
    const f = document.getElementById("gatePassword");
    f.type = f.type === "password" ? "text" : "password";
  }

  document.getElementById("gatePassword")?.addEventListener("keydown", e => {
    if (e.key === "Enter") unlockPaste();
  });

  function timeAgo(iso, future = false) {
    const diff = Math.floor((new Date(iso) - Date.now()) / 1000);
    const abs  = Math.abs(diff);
    const str  = abs < 60 ? `${abs}s` : abs < 3600 ? `${Math.floor(abs/60)}m` : abs < 86400 ? `${Math.floor(abs/3600)}h` : `${Math.floor(abs/86400)}d`;
    return future ? `in ${str}` : `${str} ago`;
  }

  loadPaste();
</script>
</body>
</html>
