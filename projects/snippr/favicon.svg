<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- True black background -->
  <rect width="32" height="32" rx="7" fill="#080808"/>

  <!-- Scissor blades suggestion: two diagonal lines crossing -->
  <!-- Top-left to center -->
  <line x1="7" y1="8" x2="17" y2="18" stroke="#00e5a0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom-left to center -->
  <line x1="7" y1="24" x2="17" y2="18" stroke="#00e5a0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right stem (the thing being cut) -->
  <line x1="17" y1="18" x2="26" y2="18" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Pivot dot -->
  <circle cx="17" cy="18" r="2" fill="#00e5a0"/>
</svg>
