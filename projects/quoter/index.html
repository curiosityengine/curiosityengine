<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quoter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --border: #2a2a2a;
      --accent: #c9a96e;
      --accent-dim: rgba(201,169,110,0.08);
      --text: #f0ece4;
      --muted: #666;
      --font-ui: 'DM Sans', sans-serif;
    }

    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font-ui); }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.5;
    }

    .page {
      position: relative; z-index: 1; max-width: 680px; margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
      display: flex; flex-direction: column; align-items: center; gap: 2rem;
    }

    header { text-align: center; animation: fadeDown 0.6s ease both; }

    .badge {
      display: inline-block; font-size: 0.6rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--accent);
      border: 1px solid rgba(201,169,110,0.3); padding: 0.25rem 0.75rem;
      border-radius: 999px; margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 700;
      letter-spacing: -0.02em; line-height: 1;
    }
    h1 em { font-style: italic; color: var(--accent); }
    .tagline { margin-top: 0.5rem; font-size: 0.75rem; color: var(--muted); letter-spacing: 0.05em; }

    /* ── Tabs ── */
    .tabs {
      display: flex; width: 100%;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 4px; gap: 4px;
      animation: fadeUp 0.6s 0.1s ease both;
    }
    .tab-btn {
      flex: 1; padding: 0.65rem 1rem; font-family: var(--font-ui);
      font-size: 0.8rem; letter-spacing: 0.03em; color: var(--muted);
      background: transparent; border: none; border-radius: 7px;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .tab-btn.active { background: var(--accent); color: #0e0e0e; font-weight: 500; }

    /* ── Tab panels ── */
    .tab-panel { display: none; width: 100%; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 1rem; animation: fadeUp 0.3s ease both; }

    /* ── Shared textarea style ── */
    textarea {
      width: 100%; padding: 1.1rem 1.25rem;
      font-family: 'Playfair Display', serif; font-size: 1.05rem;
      font-style: italic; color: var(--text); background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      resize: none; outline: none; line-height: 1.65;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: var(--accent);
    }
    textarea::placeholder { color: #383838; font-style: italic; }
    textarea:focus {
      border-color: rgba(201,169,110,0.35);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.06);
    }

    /* ── Row helpers ── */
    .row {
      display: flex; justify-content: space-between;
      align-items: center; gap: 0.75rem;
    }
    .hint-text { font-size: 0.7rem; color: var(--muted); }

    /* ── Buttons ── */
    .primary-btn {
      padding: 0.75rem 1.75rem; background: var(--accent); color: #0e0e0e;
      font-family: var(--font-ui); font-size: 0.85rem; letter-spacing: 0.04em;
      border: none; border-radius: 8px; cursor: pointer; white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
    }
    .primary-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .primary-btn:active { transform: translateY(0); }
    .primary-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Generated quote box ── */
    .quote-box {
      display: none; padding: 1.1rem 1.25rem;
      background: var(--accent-dim); border: 1px solid rgba(201,169,110,0.25);
      border-radius: 12px; font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 1.05rem; line-height: 1.65;
      color: var(--text); outline: none; min-height: 80px;
      transition: border-color 0.2s;
    }
    .quote-box:focus { border-color: rgba(201,169,110,0.5); }
    .quote-box.visible { display: block; }

    /* ── Action buttons ── */
    .action-row { display: none; width: 100%; gap: 0.75rem; }
    .action-row.visible { display: flex; }

    .action-btn {
      flex: 1; padding: 0.85rem 0.5rem; background: transparent;
      color: var(--accent); font-family: var(--font-ui); font-size: 0.75rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      border: 1px solid rgba(201,169,110,0.3); border-radius: 8px;
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
    }
    .action-btn:hover { background: var(--accent-dim); border-color: rgba(201,169,110,0.5); }
    .action-btn.primary { background: var(--accent); color: #0e0e0e; border-color: var(--accent); }
    .action-btn.primary:hover { opacity: 0.88; }

    /* ── Status + canvas ── */
    #status { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.05em; min-height: 1rem; text-align: center; }
    .canvas-wrap { width: 100%; }
    #quoteCanvas { width: 100%; height: auto; border-radius: 16px; display: block; box-shadow: 0 24px 80px rgba(0,0,0,0.6); }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(10px);  } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="badge">AI Quote Generator</div>
    <h1>Quot<em>er</em></h1>
    <p class="tagline">type a quote or an idea · get a beautiful shareable image</p>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="write">✏️ Write your own</button>
    <button class="tab-btn" data-tab="idea">✨ Give me an idea</button>
  </div>

  <!-- Tab 1: Write your own -->
  <div class="tab-panel active" id="tab-write">
    <textarea id="ownQuote" rows="4"
      placeholder="Type your quote here...&#10;&#10;e.g. Good morning · Happy Diwali · Stay hungry, stay foolish"
      maxlength="280"></textarea>
    <div class="row">
      <span class="hint-text" id="charCount">0 / 280</span>
      <button class="primary-btn" id="generateOwn">Generate →</button>
    </div>
  </div>

  <!-- Tab 2: Give me an idea -->
  <div class="tab-panel" id="tab-idea">
    <textarea id="ideaInput" rows="3"
      placeholder="Describe what you need...&#10;&#10;e.g. sad shayri about missing someone · congratulate my friend on her new job · something about rainy days"></textarea>
    <div class="row">
      <span class="hint-text">Any language · Any mood · Any occasion</span>
      <button class="primary-btn" id="getQuoteBtn">Write Quote →</button>
    </div>

    <!-- AI-written quote (editable) -->
    <div class="quote-box" id="quoteBox" contenteditable="true" spellcheck="false"></div>

    <div class="row" id="generateIdeaRow" style="display:none; justify-content:flex-end;">
      <span class="hint-text">Edit the quote if you'd like, then generate.</span>
      <button class="primary-btn" id="generateIdea">Generate Image →</button>
    </div>
  </div>

  <div id="status"></div>

  <div class="canvas-wrap" id="canvasWrap" style="display:none">
    <canvas id="quoteCanvas" width="1080" height="1080"></canvas>
  </div>

  <div class="action-row" id="actionRow">
    <button class="action-btn" id="copyBtn">⎘ Copy</button>
    <button class="action-btn primary" id="downloadBtn">↓ Download</button>
    <button class="action-btn" id="shareBtn">↗ Share</button>
  </div>

</div>
<script>
  const WORKER_URL = "https://snapcalc.princemishra11.workers.dev";

  const statusEl       = document.getElementById("status");
  const canvasWrap     = document.getElementById("canvasWrap");
  const canvas         = document.getElementById("quoteCanvas");
  const ctx            = canvas.getContext("2d");
  const actionRow      = document.getElementById("actionRow");

  // ── Tab switching ──────────────────────────
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add("active");
      canvasWrap.style.display = "none";
      actionRow.classList.remove("visible");
      setStatus("");
    });
  });

  // ── Tab 1: Write your own ──────────────────
  const ownQuote    = document.getElementById("ownQuote");
  const charCount   = document.getElementById("charCount");
  const generateOwn = document.getElementById("generateOwn");

  ownQuote.addEventListener("input", () => {
    charCount.textContent = `${ownQuote.value.length} / 280`;
  });

  generateOwn.addEventListener("click", () => {
    const q = ownQuote.value.trim();
    if (!q) return;
    makeImage(q, generateOwn);
  });

  // ── Tab 2: Idea → Quote → Image ───────────
  const ideaInput       = document.getElementById("ideaInput");
  const getQuoteBtn     = document.getElementById("getQuoteBtn");
  const quoteBox        = document.getElementById("quoteBox");
  const generateIdeaRow = document.getElementById("generateIdeaRow");
  const generateIdea    = document.getElementById("generateIdea");

  getQuoteBtn.addEventListener("click", async () => {
    const idea = ideaInput.value.trim();
    if (!idea) return;

    getQuoteBtn.disabled = true;
    getQuoteBtn.textContent = "Writing...";
    quoteBox.classList.remove("visible");
    generateIdeaRow.style.display = "none";
    canvasWrap.style.display = "none";
    actionRow.classList.remove("visible");
    setStatus("Writing your quote...");

    try {
      const res = await fetch(`${WORKER_URL}/api/generate-quote`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ idea }),
      });
      const data = await res.json();

      if (data.quote) {
        quoteBox.textContent = data.quote;
        quoteBox.classList.add("visible");
        generateIdeaRow.style.display = "flex";
        setStatus("");
      } else {
        setStatus("Couldn't write a quote. Try rephrasing your idea.");
      }
    } catch {
      setStatus("Something went wrong. Try again.");
    } finally {
      getQuoteBtn.disabled = false;
      getQuoteBtn.textContent = "Write Quote →";
    }
  });

  generateIdea.addEventListener("click", () => {
    const q = quoteBox.textContent.trim();
    if (!q) return;
    makeImage(q, generateIdea);
  });

  // ── Core: generate image ───────────────────
  async function makeImage(quote, triggerBtn) {
    triggerBtn.disabled = true;
    canvasWrap.style.display = "none";
    actionRow.classList.remove("visible");
    setStatus("Reading your quote...");

    try {
      const res = await fetch(`${WORKER_URL}/api/quote`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ quote }),
      });
      const data = await res.json();
      setStatus("Fetching the perfect image...");
      await drawQuoteImage(quote, data);
      canvasWrap.style.display = "block";
      actionRow.classList.add("visible");
      setStatus("✓ Ready to share");
    } catch {
      setStatus("Something went wrong. Try again.");
    } finally {
      triggerBtn.disabled = false;
    }
  }

  // ── Action buttons ─────────────────────────
  document.getElementById("downloadBtn").addEventListener("click", () => {
    const a = document.createElement("a");
    a.download = "quoter.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  });

  document.getElementById("copyBtn").addEventListener("click", async () => {
    try {
      const blob = await new Promise(r => canvas.toBlob(r, "image/png"));
      await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
      const btn = document.getElementById("copyBtn");
      const orig = btn.textContent;
      btn.textContent = "✓ Copied!";
      setTimeout(() => btn.textContent = orig, 2000);
    } catch {
      setStatus("Copy not supported — downloading instead.");
      document.getElementById("downloadBtn").click();
    }
  });

  document.getElementById("shareBtn").addEventListener("click", async () => {
    try {
      const blob = await new Promise(r => canvas.toBlob(r, "image/png"));
      const file = new File([blob], "quoter.png", { type: "image/png" });
      if (navigator.share && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: "Quoter" });
      } else {
        setStatus("Sharing not supported — downloading instead.");
        document.getElementById("downloadBtn").click();
      }
    } catch (e) {
      if (e.name !== "AbortError") setStatus("Could not share. Try downloading.");
    }
  });

  function setStatus(msg) { statusEl.textContent = msg; }

  // ── Canvas drawing ─────────────────────────
  async function drawQuoteImage(quote, data) {
    const SIZE = 1080;
    ctx.clearRect(0, 0, SIZE, SIZE);
    if (data.imageUrl) {
      try {
        const img = await loadImage(data.imageUrl);
        const scale = Math.max(SIZE / img.width, SIZE / img.height);
        const w = img.width * scale, h = img.height * scale;
        ctx.drawImage(img, (SIZE - w) / 2, (SIZE - h) / 2, w, h);
      } catch { drawFallbackBg(data.mood); }
    } else { drawFallbackBg(data.mood); }

    ctx.fillStyle = `rgba(0,0,0,${data.overlayOpacity ?? 0.4})`;
    ctx.fillRect(0, 0, SIZE, SIZE);

    const lineColor = data.textColor === "#000000" ? "rgba(0,0,0,0.15)" : "rgba(255,255,255,0.12)";
    ctx.fillStyle = lineColor;
    ctx.fillRect(80, 90, SIZE - 160, 1.5);
    ctx.fillRect(80, SIZE - 90, SIZE - 160, 1.5);

    drawWrappedText(quote, data.textColor ?? "#ffffff", getFontFamily(data.fontStyle), SIZE);

    if (data.attribution) {
      ctx.fillStyle = data.textColor ?? "#ffffff";
      ctx.globalAlpha = 0.6;
      ctx.font = `300 32px 'DM Sans', sans-serif`;
      ctx.textAlign = "center";
      ctx.fillText(`— ${data.attribution}`, SIZE / 2, SIZE - 130);
      ctx.globalAlpha = 1;
    }

    ctx.fillStyle = data.textColor ?? "#ffffff";
    ctx.globalAlpha = 0.35;
    ctx.font = `300 26px 'DM Sans', sans-serif`;
    ctx.textAlign = "right";
    ctx.fillText("made with Quoter", SIZE - 80, SIZE - 52);
    ctx.globalAlpha = 1;
  }

  function drawWrappedText(text, color, fontFamily, SIZE) {
    ctx.fillStyle = color;
    ctx.textAlign = "center";
    const maxWidth = SIZE - 220;
    const centerY = SIZE / 2;
    let fontSize = 88;
    if (text.length > 80)  fontSize = 62;
    if (text.length > 140) fontSize = 50;
    if (text.length > 200) fontSize = 42;
    ctx.font = `italic ${fontSize}px ${fontFamily}`;
    const words = text.split(" ");
    const lines = [];
    let current = "";
    for (const word of words) {
      const test = current ? `${current} ${word}` : word;
      if (ctx.measureText(test).width > maxWidth && current) { lines.push(current); current = word; }
      else current = test;
    }
    if (current) lines.push(current);
    ctx.globalAlpha = 0.25;
    ctx.font = `italic ${fontSize * 3.5}px ${fontFamily}`;
    ctx.fillText("\u201C", SIZE / 2 - maxWidth / 2 + 40, centerY - lines.length * fontSize * 0.65);
    ctx.globalAlpha = 1;
    ctx.font = `italic ${fontSize}px ${fontFamily}`;
    const lineHeight = fontSize * 1.35;
    const startY = centerY - (lines.length * lineHeight) / 2 + fontSize * 0.4;
    lines.forEach((line, i) => ctx.fillText(line, SIZE / 2, startY + i * lineHeight));
  }

  function drawFallbackBg(mood) {
    const g = { joyful:["#f6d365","#fda085"], festive:["#a18cd1","#fbc2eb"], calm:["#2193b0","#6dd5ed"], motivational:["#1c1c1c","#434343"], romantic:["#f093fb","#f5576c"], sad:["#2c3e50","#3498db"], spiritual:["#654ea3","#eaafc8"], nature:["#134e5e","#71b280"], dark:["#0f0c29","#302b63"] };
    const [c1, c2] = g[mood] ?? g.motivational;
    const grad = ctx.createLinearGradient(0, 0, 1080, 1080);
    grad.addColorStop(0, c1); grad.addColorStop(1, c2);
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 1080, 1080);
  }

  function getFontFamily(style) {
    if (style === "script") return "'Dancing Script', cursive";
    if (style === "sans")   return "'DM Sans', sans-serif";
    return "'Playfair Display', serif";
  }

  function loadImage(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = url;
    });
  }
</script>
</body>
</html>
