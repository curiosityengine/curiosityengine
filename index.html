<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #4facfe, #00f2fe);
}

canvas { display: block; }

#ui {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 40px;
  font-weight: bold;
}

#gameOver {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.7);
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  color: white;
  display: none;
}
</style>
</head>

<body>

<div id="ui">0</div>

<div id="gameOver">
  <h2>Game Over</h2>
  <p id="finalScore"></p>
  <button onclick="restart()">Restart</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let bird, pipes, score, running;

// physics tuned for Telegram
const gravity = 0.5;
const lift = -9;

function init() {
  bird = {
    x: 80,
    y: canvas.height / 2,
    v: 0
  };

  pipes = [];
  score = 0;
  running = true;

  document.getElementById("ui").innerText = "0";
  document.getElementById("gameOver").style.display = "none";
}

function createPipe() {
  const gap = 150;
  const top = Math.random() * (canvas.height - gap - 100);

  pipes.push({
    x: canvas.width,
    w: 60,
    top: top,
    bottom: top + gap,
    passed: false
  });
}

// reliable timing (NOT delta-based)
setInterval(createPipe, 1500);

function drawBird() {
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, 14, 0, Math.PI * 2);
  ctx.fillStyle = "#ffd166";
  ctx.fill();

  ctx.beginPath();
  ctx.arc(bird.x + 5, bird.y - 5, 4, 0, Math.PI * 2);
  ctx.fillStyle = "#fff";
  ctx.fill();

  ctx.beginPath();
  ctx.arc(bird.x + 6, bird.y - 5, 2, 0, Math.PI * 2);
  ctx.fillStyle = "#000";
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(bird.x + 14, bird.y);
  ctx.lineTo(bird.x + 22, bird.y - 4);
  ctx.lineTo(bird.x + 22, bird.y + 4);
  ctx.fillStyle = "#ff7b00";
  ctx.fill();
}

function update() {
  if (!running) return;

  bird.v += gravity;
  bird.v = Math.min(bird.v, 10);
  bird.y += bird.v;

  pipes.forEach(pipe => {
    pipe.x -= 3;

    // collision
    if (
      bird.x + 12 > pipe.x &&
      bird.x - 12 < pipe.x + pipe.w &&
      (bird.y - 12 < pipe.top || bird.y + 12 > pipe.bottom)
    ) {
      gameOver();
    }

    // score
    if (!pipe.passed && pipe.x + pipe.w < bird.x) {
      pipe.passed = true;
      score++;
      document.getElementById("ui").innerText = score;
    }
  });

  if (bird.y > canvas.height || bird.y < 0) {
    gameOver();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // tilt
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.v * 0.05);
  ctx.translate(-bird.x, -bird.y);

  drawBird();

  ctx.restore();

  ctx.fillStyle = "#2ecc71";
  pipes.forEach(pipe => {
    ctx.fillRect(pipe.x, 0, pipe.w, pipe.top);
    ctx.fillRect(pipe.x, pipe.bottom, pipe.w, canvas.height);
  });
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function gameOver() {
  running = false;
  document.getElementById("gameOver").style.display = "block";
  document.getElementById("finalScore").innerText = "Score: " + score;
}

function restart() {
  init();
}

// controls
window.addEventListener("click", () => bird.v = lift);
window.addEventListener("touchstart", () => bird.v = lift);

// start
init();
loop();
</script>

</body>
</html>
