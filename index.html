<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(to bottom, #4facfe, #00f2fe);
}

canvas {
  display: block;
}

#ui {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 40px;
  font-weight: 600;
}

#gameOver {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.7);
  padding: 30px;
  border-radius: 16px;
  text-align: center;
  color: white;
  display: none;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #4facfe;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="ui">0</div>

<div id="gameOver">
  <h2>Game Over</h2>
  <p id="finalScore"></p>
  <button onclick="restart()">Play Again</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let bird = {
  x: 80,
  y: 200,
  radius: 12,
  velocity: 0
};

let gravity = 0.5;
let lift = -10;

let pipes = [];
let score = 0;
let gameRunning = true;

function createPipe() {
  let gap = 150;
  let top = Math.random() * (canvas.height - gap - 100);

  pipes.push({
    x: canvas.width,
    width: 60,
    top: top,
    bottom: top + gap
  });
}

setInterval(createPipe, 1500);

function drawBird() {
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
  ctx.fillStyle = "#ffcc00";
  ctx.fill();
}

function drawPipes() {
  ctx.fillStyle = "#2ecc71";

  pipes.forEach(pipe => {
    ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
    ctx.fillRect(pipe.x, pipe.bottom, pipe.width, canvas.height);
  });
}

function update() {
  if (!gameRunning) return;

  bird.velocity += gravity;
  bird.y += bird.velocity;

  pipes.forEach(pipe => {
    pipe.x -= 3;

    // collision
    if (
      bird.x + bird.radius > pipe.x &&
      bird.x - bird.radius < pipe.x + pipe.width &&
      (bird.y - bird.radius < pipe.top ||
       bird.y + bird.radius > pipe.bottom)
    ) {
      gameOver();
    }

    // score
    if (pipe.x + pipe.width === bird.x) {
      score++;
      document.getElementById("ui").innerText = score;
    }
  });

  // ground collision
  if (bird.y > canvas.height || bird.y < 0) {
    gameOver();
  }
}

function gameOver() {
  gameRunning = false;
  document.getElementById("gameOver").style.display = "block";
  document.getElementById("finalScore").innerText = "Score: " + score;
}

function restart() {
  bird.y = 200;
  bird.velocity = 0;
  pipes = [];
  score = 0;
  gameRunning = true;
  document.getElementById("ui").innerText = 0;
  document.getElementById("gameOver").style.display = "none";
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBird();
  drawPipes();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

// controls
window.addEventListener("click", () => {
  bird.velocity = lift;
});

window.addEventListener("touchstart", () => {
  bird.velocity = lift;
});
</script>

</body>
</html>
