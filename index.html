<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(to bottom, #4facfe, #00f2fe);
}

canvas {
  display: block;
}

#ui {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 40px;
  font-weight: 600;
}

#gameOver {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.7);
  padding: 30px;
  border-radius: 16px;
  text-align: center;
  color: white;
  display: none;
  backdrop-filter: blur(10px);
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #4facfe;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="ui">0</div>

<div id="gameOver">
  <h2>Game Over</h2>
  <p id="finalScore"></p>
  <button onclick="restart()">Play Again</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
let lastTime = 0;
let pipeTimer = 0;

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let bird = {
  x: 80,
  y: canvas.height / 2,
  radius: 12,
  velocity: 0
};

let gravity = 0.4;
let lift = -8;

let pipes = [];
let score = 0;
let gameRunning = true;

// Create pipes
function createPipe() {
  let gap = 160;
  let top = Math.random() * (canvas.height - gap - 100);

  pipes.push({
    x: canvas.width,
    width: 60,
    top: top,
    bottom: top + gap,
    passed: false
  });
}

// Draw bird with face
function drawBird() {
  // body
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, 14, 0, Math.PI * 2);
  ctx.fillStyle = "#ffd166";
  ctx.fill();

  // eye
  ctx.beginPath();
  ctx.arc(bird.x + 5, bird.y - 5, 4, 0, Math.PI * 2);
  ctx.fillStyle = "#fff";
  ctx.fill();

  // pupil
  ctx.beginPath();
  ctx.arc(bird.x + 6, bird.y - 5, 2, 0, Math.PI * 2);
  ctx.fillStyle = "#000";
  ctx.fill();

  // beak
  ctx.beginPath();
  ctx.moveTo(bird.x + 14, bird.y);
  ctx.lineTo(bird.x + 22, bird.y - 4);
  ctx.lineTo(bird.x + 22, bird.y + 4);
  ctx.closePath();
  ctx.fillStyle = "#ff7b00";
  ctx.fill();
}

// Draw pipes
function drawPipes() {
  ctx.fillStyle = "#2ecc71";

  pipes.forEach(pipe => {
    ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
    ctx.fillRect(pipe.x, pipe.bottom, pipe.width, canvas.height);
  });
}

// Update game
function update(delta) {
  if (!gameRunning) return;

  // Bird physics
  bird.velocity += gravity * delta;
  bird.velocity = Math.min(bird.velocity, 10);
  bird.y += bird.velocity * delta;

  // Pipe spawn (delta-based)
  pipeTimer += delta;
  if (pipeTimer > 90) {
    createPipe();
    pipeTimer = 0;
  }

  pipes.forEach(pipe => {
    pipe.x -= 3 * delta;

    // Collision
    if (
      bird.x + bird.radius > pipe.x &&
      bird.x - bird.radius < pipe.x + pipe.width &&
      (bird.y - bird.radius < pipe.top ||
       bird.y + bird.radius > pipe.bottom)
    ) {
      gameOver();
    }

    // Scoring
    if (!pipe.passed && pipe.x + pipe.width < bird.x) {
      pipe.passed = true;
      score++;
      document.getElementById("ui").innerText = score;
    }
  });

  // Ground / sky collision
  if (bird.y > canvas.height || bird.y < 0) {
    gameOver();
  }
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Bird tilt
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.velocity * 0.05);
  ctx.translate(-bird.x, -bird.y);

  drawBird();

  ctx.restore();

  drawPipes();
}

// Game loop
function loop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const delta = (timestamp - lastTime) / 16.67;
  lastTime = timestamp;

  update(delta);
  draw();

  requestAnimationFrame(loop);
}

loop();

// Game Over
function gameOver() {
  gameRunning = false;
  document.getElementById("gameOver").style.display = "block";
  document.getElementById("finalScore").innerText = "Score: " + score;
}

// Restart
function restart() {
  bird.y = canvas.height / 2;
  bird.velocity = 0;
  pipes = [];
  score = 0;
  gameRunning = true;
  pipeTimer = 0;

  document.getElementById("ui").innerText = 0;
  document.getElementById("gameOver").style.display = "none";
}

// Controls
window.addEventListener("click", () => {
  bird.velocity = lift;
});

window.addEventListener("touchstart", () => {
  bird.velocity = lift;
});
</script>

</body>
</html>
