<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f0f1a;
      color: #fff;
    }

    .container {
      max-width: 700px;
      margin: 60px auto;
      padding: 20px;
    }

    .card {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 30px;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #aaa;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 6px;
      color: #aaa;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #6c63ff;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      background: #5a52d5;
    }

    .links {
      margin-top: 25px;
      text-align: center;
    }

    .links a {
      margin: 0 10px;
      color: #aaa;
      text-decoration: none;
    }

    .links a:hover {
      color: white;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">

    <h1>Contact Me</h1>
    <p class="subtitle">Let's connect or collaborate</p>

    <form>
      <div class="form-group">
        <label>Name</label>
        <input type="text" placeholder="Your name">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Your email">
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea placeholder="Write your message..."></textarea>
      </div>

      <button class="btn">Send Message</button>
    </form>

    <div class="links">
      <p>Or reach me at:</p>
      <a href="mailto:your@email.com">Email</a>
      <a href="https://github.com/YOUR-USERNAME" target="_blank">GitHub</a>
      <a href="https://linkedin.com/in/YOUR-PROFILE" target="_blank">LinkedIn</a>
    </div>

  </div>

</div>

</body>
</html>
